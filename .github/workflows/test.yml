name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run tests
        working-directory: backend
        run: npm test

      - name: Deploy to Render
        # Only deploy on push to main — never on pull requests
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: curl --silent --show-error --fail "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
